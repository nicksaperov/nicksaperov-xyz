<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restricted Treasury Protocol | L2 Base</title>
    
    <!-- Zero-Build Mandate: Standalone CDN Architecture -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- External Assets -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { 
            background-color: #0a0a0f; 
            color: #00ffcc; 
            font-family: 'Courier New', Courier, monospace; 
        }
        
        /* Custom UI Components */
        .glass-panel {
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        
        .cyber-glitch { text-shadow: 0 0 8px rgba(239, 68, 68, 0.6); }
        
        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 50;
            position: fixed;
            pointer-events: none;
            background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(239,68,68,0.05) 50%, rgba(0,0,0,0) 100%);
            opacity: 0.1;
            animation: scanline 8s linear infinite;
        }
        @keyframes scanline {
            0% { top: -100px; }
            100% { top: 100%; }
        }
    </style>
</head>
<body class="relative overflow-x-hidden selection:bg-red-500/30 selection:text-white">
    <div class="scanline"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Глобальный объект с мок-данными
        const debtData = {
            totalOwed: 100000,
            currency: 'USDT',
            safeAddress: '0x123400000000000000000000000000000000abcd',
            network: 'Base',
            threshold: '2/3 Multisig',
            history: [
                { date: '2026-02-15', amount: 5000, txHash: '0xabcdef1234567890abcdef1234567890abcdef1234567890abcdef1234567890', note: 'Initial test repayment' }
            ],
            expected: [
                { date: '2026-04-01', amount: 15000, status: 'On Track' },
                { date: '2026-06-01', amount: 20000, status: 'Pending' }
            ],
            statusText: {
                en: "Current runway is stable. Operation Cyber-Cat successfully deployed. Expecting Q2 revenue to cover the next milestone. Funds are secured in the Base L2 Safe; require 2 of 3 signatures to execute any external transfer.",
                ru: "Текущий runway стабилен. Операция Cyber-Cat успешно запущена. Ожидаю, что выручка во втором квартале покроет следующий рубеж выплат. Средства надежно защищены в сейфе сети Base L2; для выполнения любого внешнего перевода требуются 2 из 3 подписей."
            }
        };

        // PROTOCOL ACCESS MATRIX
        const AUTHORIZED_OPERATORS = [
            'nick@nicksaperov.xyz',
            'danzalev@gmail.com',
            'kirill.khabarov@gmail.com'
        ];

        const App = () => {
            // Логика состояния
            const [view, setView] = useState('portal-auth'); 
            const [portalEmail, setPortalEmail] = useState('');
            const [portalPassword, setPortalPassword] = useState('');
            const [portalError, setPortalError] = useState('');
            const [lang, setLang] = useState('en');

            // Strict Auth Logic
            const handlePortalLogin = (e) => {
                e.preventDefault();
                
                // Defensive Programming: Normalize input to prevent case-sensitivity lockout issues
                const normalizedInputEmail = portalEmail.trim().toLowerCase();
                const isAuthorizedUser = AUTHORIZED_OPERATORS.includes(normalizedInputEmail);

                if (isAuthorizedUser && portalPassword === 'cybercat2026') {
                    setView('portal-dashboard');
                    setPortalError('');
                } else {
                    // Purposefully vague error message to prevent email-fishing
                    setPortalError('UNAUTHORIZED IDENTITY OR INVALID PASSCODE.');
                }
            };

            // Clipboard Action
            const copyToClipboard = (text, btnId) => {
                navigator.clipboard.writeText(text).then(() => {
                    const btn = document.getElementById(btnId);
                    if (btn) {
                        const originalHtml = btn.innerHTML;
                        btn.innerHTML = '<i class="fa-solid fa-check text-green-500"></i>';
                        setTimeout(() => btn.innerHTML = originalHtml, 2000);
                    }
                });
            };

            return (
                <React.Fragment>
                    {/* VIEW: PORTAL AUTH (Stealth Mode) */}
                    {view === 'portal-auth' && (
                        <section className="animate-fade-in flex items-center justify-center min-h-screen bg-[#0a0a0f] p-4 relative z-10">
                            <div className="glass-panel p-10 rounded-xl border border-red-500/30 w-full max-w-md relative overflow-hidden shadow-[0_0_30px_rgba(239,68,68,0.1)]">
                                <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-red-500/10 to-transparent pointer-events-none"></div>
                                
                                <div className="text-center mb-8 relative z-10">
                                    <i className="fa-solid fa-shield-halved text-4xl text-red-500 mb-4"></i>
                                    <h2 className="text-2xl font-mono font-bold text-white tracking-widest cyber-glitch">RESTRICTED PROTOCOL</h2>
                                    <p className="text-xs text-gray-400 font-mono mt-2 uppercase tracking-widest">Multisig Treasury Authentication</p>
                                </div>

                                <form onSubmit={handlePortalLogin} className="space-y-6 relative z-10">
                                    <div>
                                        <label className="block text-xs font-mono text-gray-400 mb-1 tracking-widest">IDENTIFIER (EMAIL)</label>
                                        <input 
                                            type="email" 
                                            required
                                            value={portalEmail}
                                            onChange={(e) => setPortalEmail(e.target.value)}
                                            className="w-full bg-black/50 border border-gray-700 rounded px-4 py-3 text-white font-mono focus:outline-none focus:border-red-500 transition-colors"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-mono text-gray-400 mb-1 tracking-widest">PASSCODE</label>
                                        <input 
                                            type="password" 
                                            required
                                            value={portalPassword}
                                            onChange={(e) => setPortalPassword(e.target.value)}
                                            className="w-full bg-black/50 border border-gray-700 rounded px-4 py-3 text-white font-mono focus:outline-none focus:border-red-500 transition-colors"
                                        />
                                    </div>
                                    
                                    {portalError && (
                                        <div className="text-red-500 text-xs font-mono bg-red-500/10 p-3 rounded border border-red-500/20">
                                            <i className="fa-solid fa-triangle-exclamation mr-2"></i>{portalError}
                                        </div>
                                    )}

                                    <button type="submit" className="w-full py-4 bg-red-500/10 border border-red-500/50 text-red-400 font-mono font-bold rounded hover:bg-red-500 hover:text-white transition-all shadow-[0_0_15px_rgba(239,68,68,0.1)] hover:shadow-[0_0_20px_rgba(239,68,68,0.4)] tracking-widest mt-4">
                                        INITIATE HANDSHAKE
                                    </button>
                                </form>
                            </div>
                        </section>
                    )}

                    {/* VIEW: PORTAL DASHBOARD */}
                    {view === 'portal-dashboard' && (
                        <section className="animate-fade-in max-w-5xl mx-auto min-h-screen bg-[#0a0a0f] p-4 sm:p-10 relative z-10">
                            <div className="flex justify-between items-end mb-10 border-b border-gray-800 pb-6">
                                <div>
                                    <div className="inline-flex items-center gap-2 px-3 py-1 mb-4 text-xs font-mono text-green-400 border border-green-500/50 rounded-full bg-green-500/10 tracking-widest">
                                        <span className="relative flex h-2 w-2">
                                            <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                                            <span className="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                                        </span>
                                        SYSTEM: VERIFIED
                                    </div>
                                    <h1 className="text-4xl font-bold text-white font-mono uppercase tracking-widest">Treasury Protocol</h1>
                                    <p className="text-xs text-gray-500 mt-2 tracking-widest uppercase">Authorized Identity: {portalEmail}</p>
                                </div>
                                <button onClick={() => { setView('portal-auth'); setPortalPassword(''); }} className="text-gray-500 hover:text-red-400 transition-colors font-mono text-sm tracking-widest">
                                    <i className="fa-solid fa-power-off mr-2"></i>LOGOUT
                                </button>
                            </div>

                            {/* Top Stats Row */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                                <div className="glass-panel p-8 rounded-xl border-l-4 border-l-red-500 relative overflow-hidden shadow-[0_4px_20px_rgba(0,0,0,0.5)]">
                                    <h3 className="text-xs font-mono text-gray-400 mb-2 tracking-widest">TOTAL REMAINING OBLIGATION</h3>
                                    <div className="text-5xl font-mono font-bold text-white tracking-tighter">
                                        ${debtData.totalOwed.toLocaleString()} <span className="text-xl text-gray-500 ml-1">{debtData.currency}</span>
                                    </div>
                                    <i className="fa-solid fa-building-columns absolute -right-6 -bottom-6 text-9xl text-white opacity-5"></i>
                                </div>

                                <div className="glass-panel p-8 rounded-xl border border-gray-800 flex flex-col justify-center shadow-[0_4px_20px_rgba(0,0,0,0.5)]">
                                    <h3 className="text-xs font-mono text-gray-400 mb-4 tracking-widest">ON-CHAIN MULTISIG STATUS</h3>
                                    <div className="flex flex-col gap-3 font-mono text-sm">
                                        <div className="flex justify-between border-b border-gray-800 pb-2">
                                            <span className="text-gray-500">Network:</span>
                                            <span className="text-blue-400">{debtData.network}</span>
                                        </div>
                                        <div className="flex justify-between border-b border-gray-800 pb-2">
                                            <span className="text-gray-500">Rule:</span>
                                            <span className="text-green-400">{debtData.threshold}</span>
                                        </div>
                                        <div className="flex justify-between items-center pt-1">
                                            <span className="text-gray-500">Safe ID:</span>
                                            <div className="flex items-center gap-2">
                                                <span className="text-white bg-gray-800/80 px-2 py-1 rounded text-xs border border-gray-700">
                                                    {debtData.safeAddress.substring(0,6)}...{debtData.safeAddress.substring(38)}
                                                </span>
                                                <button onClick={() => copyToClipboard(debtData.safeAddress, 'safe-copy-btn')} id="safe-copy-btn" className="text-gray-400 hover:text-white transition-colors">
                                                    <i className="fa-regular fa-copy"></i>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                    <a href={`https://app.safe.global/home?safe=base:${debtData.safeAddress}`} target="_blank" rel="noreferrer" className="mt-5 w-full py-3 bg-white/10 text-white font-bold font-mono text-xs rounded text-center border border-white/20 hover:bg-white hover:text-black transition-all tracking-widest">
                                        ACCESS SAFE INTERFACE <i className="fa-solid fa-arrow-up-right-from-square ml-1"></i>
                                    </a>
                                </div>
                            </div>

                            {/* Details Grid */}
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                <div className="lg:col-span-2 space-y-6">
                                    {/* Expected Repayments */}
                                    <div className="glass-panel rounded-xl border border-gray-800 overflow-hidden shadow-[0_4px_20px_rgba(0,0,0,0.5)]">
                                        <div className="bg-[#11111a] px-6 py-4 border-b border-gray-800 flex justify-between items-center">
                                            <h3 className="font-bold text-white font-mono tracking-widest text-sm uppercase"><i className="fa-solid fa-calendar-clock mr-2 text-cyan-400"></i>Projected Timeline</h3>
                                        </div>
                                        <div className="p-6">
                                            <div className="space-y-4">
                                                {debtData.expected.map((item, idx) => (
                                                    <div key={idx} className="flex justify-between items-center border-l-2 border-cyan-400/50 pl-4 py-2 hover:bg-white/[0.02] transition-colors rounded-r">
                                                        <div>
                                                            <div className="text-white font-bold font-mono text-lg">${item.amount.toLocaleString()}</div>
                                                            <div className="text-gray-500 text-xs font-mono mt-1">{item.date}</div>
                                                        </div>
                                                        <span className={`px-3 py-1 rounded text-[10px] font-mono font-bold tracking-widest uppercase ${item.status === 'On Track' ? 'bg-green-500/10 text-green-400 border border-green-500/30' : 'bg-yellow-500/10 text-yellow-400 border border-yellow-500/30'}`}>
                                                            {item.status}
                                                        </span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Status Text Block */}
                                <div className="lg:col-span-1">
                                    <div className="glass-panel rounded-xl border border-gray-800 h-full p-6 relative overflow-hidden shadow-[0_4px_20px_rgba(0,0,0,0.5)]">
                                        <i className="fa-solid fa-quote-left absolute top-4 right-4 text-5xl text-gray-800 opacity-30"></i>
                                        <h3 className="font-bold text-white font-mono mb-4 border-b border-gray-800 pb-2 tracking-widest text-sm uppercase">Founder's Status</h3>
                                        <p className="text-gray-400 text-sm leading-relaxed whitespace-pre-wrap font-mono">
                                            {debtData.statusText.en}
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </section>
                    )}
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
