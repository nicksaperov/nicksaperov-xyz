                                    key={pitch.id}
                                    onClick={() => setActivePitch(pitch.id)}
                                    className={`flex-1 sm:flex-none px-6 py-2.5 rounded-full text-sm font-bold transition-all duration-300 relative z-10
                                        ${activePitch === pitch.id ? 'text-black' : 'text-gray-400 hover:text-white'}`}
                                >
                                    {pitch.label}
                                </button>
                            ))}
                            {/* Sliding Background Highlight */}
                            <div 
                                className="absolute top-1 bottom-1 bg-quant-green rounded-full transition-all duration-300 z-0"
                                style={{
                                    width: 'calc(33.333% - 4px)',
                                    left: activePitch === 'easy' ? '4px' : activePitch === 'intermediate' ? 'calc(33.333% + 2px)' : 'calc(66.666%)'
                                }}
                            ></div>
                        </div>
                    </div>

                    <div className="bg-quant-dark border border-quant-border rounded-xl p-8 md:p-12 shadow-2xl relative overflow-hidden">
                         {/* Subtle background glow */}
                        <div className="absolute -top-24 -right-24 w-48 h-48 bg-quant-green/10 blur-3xl rounded-full pointer-events-none"></div>
                        
                        <div className="mb-8 border-b border-quant-border pb-6">
                            <div className="text-xs font-mono text-quant-blue mb-2 uppercase tracking-wider">{t.targetLabel} {currentData.target}</div>
                            <h3 className="text-2xl md:text-3xl font-bold text-white">{currentData.title}</h3>
                        </div>

                        <div 
                            ref={contentRef}
                            className="markdown-content text-lg" 
                            dangerouslySetInnerHTML={{ __html: currentData.content }} 
                        />
                    </div>
                </section>
            );
        };

        const KnowledgeBase = ({ onBack, lang }) => {
            const kbRef = useRef(null);
            const t = TRANSLATIONS[lang].kbSection;

             useEffect(() => {
                window.scrollTo(0, 0);
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise([kbRef.current]).catch((err) => console.log('MathJax error: ', err));
                }
            }, [lang]);

            return (
                <div className="min-h-screen pt-32 pb-20 px-6 max-w-7xl mx-auto animate-fade-in" ref={kbRef}>
                    <button 
                        onClick={onBack}
                        className="flex items-center gap-2 text-gray-400 hover:text-white transition-colors mb-12 font-mono text-sm"
                    >
                        <Icon name="ArrowLeft" className="w-4 h-4" />
                        {t.backBtn}
                    </button>

                    <div className="mb-16 border-b border-quant-border pb-10">
                        <h1 className="text-4xl md:text-5xl font-bold tracking-tight mb-4 flex items-center gap-4">
                            <Icon name="BookOpen" className="w-10 h-10 text-quant-blue" />
                            {t.title}
                        </h1>
                        <p className="text-xl text-gray-400">{t.subtitle}</p>
                    </div>

                    <div className="space-y-24">
                        {KB_CATEGORIES[lang].map((category, catIdx) => (
                            <div key={catIdx}>
                                <h2 className="text-2xl font-bold text-purple-400 border-b border-dashed border-gray-800 pb-3 mb-8 tracking-wide">
                                    {category.title}
                                </h2>
                                
                                <div className="space-y-12">
                                    {category.entries.map((entry, idx) => (
                                        <div key={idx} className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                            
                                            {/* Technical Column */}
                                            <div className="lg:col-span-2 bg-quant-dark p-8 rounded-xl border border-quant-border shadow-2xl">
                                                <span className="inline-block bg-gray-800 text-gray-400 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider mb-4">
                                                    {entry.tag}
                                                </span>
                                                <h3 className="text-2xl font-bold text-quant-blue mb-6">{entry.term}</h3>
                                                <div 
                                                    className="text-gray-300 leading-relaxed markdown-content" 
                                                    dangerouslySetInnerHTML={{__html: entry.academic}} 
                                                />
                                            </div>
                                            
                                            {/* Plain English Column */}
                                            <div className="lg:col-span-1 bg-black/60 p-8 rounded-xl border border-green-900/30 shadow-2xl flex flex-col justify-center">
                                                <h4 className="text-sm font-bold text-quant-green uppercase tracking-wider mb-4 flex items-center gap-2 border-b border-gray-800 pb-2">
                                                    <Icon name="Zap" className="w-4 h-4" />
                                                    {t.plainEnglishTitle}
                                                </h4>
                                                <div 
                                                    className="text-gray-300 leading-relaxed italic text-sm md:text-base space-y-4" 
                                                    dangerouslySetInnerHTML={{__html: entry.plain}} 
                                                />
                                            </div>

                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };


        // --- MAIN APP (ROUTER) ---
        const App = () => {
            const [scrolled, setScrolled] = useState(false);
            const [currentView, setCurrentView] = useState('home'); // 'home' or 'kb'
            const [lang, setLang] = useState('en'); // 'en' or 'ru'

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);
            
            const t = TRANSLATIONS[lang];

            if (currentView === 'kb') {
                return (
                    <div className="min-h-screen">
                         <nav className="fixed w-full z-50 bg-quant-black/90 backdrop-blur-md border-b border-quant-border py-4 transition-all duration-300">
                            <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                                <div className="text-xl font-bold tracking-tighter flex items-center gap-2 cursor-pointer hover:opacity-80 transition-opacity" onClick={() => setCurrentView('home')}>
                                    <Icon name="Cpu" className="w-6 h-6 text-quant-green" />
                                    <span>{t.nav.title}<span className="text-gray-500">{t.nav.subtitle}</span></span>
                                </div>
                                <LanguageToggle currentLang={lang} setLang={setLang} />
                            </div>
                        </nav>
                        <KnowledgeBase onBack={() => setCurrentView('home')} lang={lang} />
                    </div>
                )
            }

            return (
                <div className="min-h-screen">
                    {/* Navigation */}
                    <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled ? 'bg-quant-black/90 backdrop-blur-md border-b border-quant-border py-4' : 'bg-transparent py-6'}`}>
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <div className="text-xl font-bold tracking-tighter flex items-center gap-2">
                                <Icon name="Cpu" className="w-6 h-6 text-quant-green" />
                                <span>{t.nav.title}<span className="text-gray-500">{t.nav.subtitle}</span></span>
                            </div>
                            <div className="hidden md:flex items-center gap-8 text-sm font-medium text-gray-400">
                                <a href="#architecture" className="hover:text-white transition-colors">{t.nav.architecture}</a>
                                <a href="#pitch-deck" className="hover:text-white transition-colors">{t.nav.pitch}</a>
                            </div>
                            <div className="flex items-center gap-4">
                                <LanguageToggle currentLang={lang} setLang={setLang} />
                                <button 
                                    onClick={() => setCurrentView('kb')}
                                    className="px-5 py-2 text-sm font-bold bg-white text-black hover:bg-gray-200 transition-colors rounded-full flex items-center gap-2 md:hidden"
                                >
                                    <Icon name="BookOpen" className="w-4 h-4" />
                                    KB
                                </button>
                                <button 
                                    onClick={() => setCurrentView('kb')}
                                    className="hidden md:flex px-5 py-2 text-sm font-bold bg-white text-black hover:bg-gray-200 transition-colors rounded-full items-center gap-2"
                                >
                                    <Icon name="BookOpen" className="w-4 h-4" />
                                    {t.nav.kb}
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <section className="pt-40 pb-20 px-6 max-w-7xl mx-auto flex flex-col items-center text-center">
                        <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-quant-border/50 border border-gray-700 text-xs font-mono text-gray-400 mb-8">
                            <span className="w-2 h-2 rounded-full bg-quant-green animate-pulse"></span>
                            {t.hero.badge}
                        </div>
                        <h1 className="text-5xl md:text-7xl font-bold tracking-tight mb-6 max-w-4xl glow-text">
                            {t.hero.title1} <br/>
                            <span className="text-transparent bg-clip-text bg-gradient-to-r from-quant-green to-quant-blue">{t.hero.title2}</span>
                        </h1>
                        <p className="text-xl text-gray-400 max-w-2xl mb-10">
                            {t.hero.description}
                        </p>
                        <div className="flex gap-4">
                            <button className="px-8 py-3 bg-quant-green text-black font-bold rounded hover:bg-green-400 transition-colors" onClick={() => document.getElementById('architecture').scrollIntoView({ behavior: 'smooth' })}>
                                {t.hero.btnArch}
                            </button>
                            <button onClick={() => setCurrentView('kb')} className="px-8 py-3 border border-quant-border text-white font-bold rounded hover:bg-gray-900 transition-colors">
                                {t.hero.btnKb}
                            </button>
                        </div>
                    </section>

                    {/* Core Systems Grid */}
                    <section id="architecture" className="py-20 px-6 max-w-7xl mx-auto border-t border-quant-border">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            
                            <div className="p-8 border border-quant-border bg-quant-dark rounded-xl hover:border-gray-600 transition-colors group relative overflow-hidden">
                                <div className="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                                    <Icon name="Zap" className="w-24 h-24" />
                                </div>
                                <Icon name="Zap" className="w-10 h-10 text-quant-green mb-6 group-hover:scale-110 transition-transform relative z-10" />
                                <h3 className="text-xl font-bold mb-3 relative z-10">{t.architecture.jit.title}</h3>
                                <p className="text-gray-400 text-sm leading-relaxed relative z-10">
                                    {t.architecture.jit.desc}
                                </p>
                            </div>

                            <div className="p-8 border border-quant-border bg-quant-dark rounded-xl hover:border-gray-600 transition-colors group relative overflow-hidden">
                                <div className="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                                    <Icon name="BrainCircuit" className="w-24 h-24" />
                                </div>
                                <Icon name="BrainCircuit" className="w-10 h-10 text-quant-blue mb-6 group-hover:scale-110 transition-transform relative z-10" />
                                <h3 className="text-xl font-bold mb-3 relative z-10">{t.architecture.ai.title}</h3>
                                <p className="text-gray-400 text-sm leading-relaxed relative z-10">
                                    {t.architecture.ai.desc}
                                </p>
                            </div>

                            <div className="p-8 border border-quant-border bg-quant-dark rounded-xl hover:border-gray-600 transition-colors group relative overflow-hidden">
                                <div className="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                                    <Icon name="ShieldCheck" className="w-24 h-24" />
                                </div>
                                <Icon name="ShieldCheck" className="w-10 h-10 text-purple-400 mb-6 group-hover:scale-110 transition-transform relative z-10" />
                                <h3 className="text-xl font-bold mb-3 relative z-10">{t.architecture.mev.title}</h3>
                                <p className="text-gray-400 text-sm leading-relaxed relative z-10">
                                    {t.architecture.mev.desc}
                                </p>
                            </div>

                        </div>
                    </section>

                    {/* The Dynamic Pitch Section */}
                    <PitchSection lang={lang} />

                    {/* Footer */}
                    <footer className="py-12 border-t border-quant-border text-center text-sm text-gray-500 font-mono">
                        <div className="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div>{t.footer.copyright}</div>
                            <div className="flex gap-6">
                                <a href="https://www.github.com/nicksaperov" target="_blank" rel="noopener noreferrer" className="hover:text-white">GITHUB</a>
                                <a href="https://www.linkedin.com/in/nicksaperov" target="_blank" rel="noopener noreferrer" className="hover:text-white">LINKEDIN</a>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</body>
</html>
