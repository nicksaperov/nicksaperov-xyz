<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sundragon Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- React & Babel Standalone -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        saffron: { 50: '#FDF3ED', 100: '#FBE4D7', 200: '#F6C3A9', 300: '#F09D75', 400: '#E28C5F', 500: '#D87542', 600: '#C26535', 700: '#A1512A', 800: '#824225', 900: '#693620' }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #f8fafc; color: #0f172a; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>

    <script type="module">
        import { initializeApp, getApps, getApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, getDocs, query, orderBy, addDoc, serverTimestamp, doc, deleteDoc, getDoc, setDoc, writeBatch, updateDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
        import { getStorage, ref, uploadBytesResumable, getDownloadURL, deleteObject } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCK2nTz6xHoaYPRUmUyFXpu7-l9u1Hilug",
            authDomain: "nicksaperov-portfolio-2026.firebaseapp.com",
            projectId: "nicksaperov-portfolio-2026",
            storageBucket: "nicksaperov-portfolio-2026.firebasestorage.app",
            messagingSenderId: "769848303631",
            appId: "1:769848303631:web:d58ca6fef3b687b520c37a"
        };

        try {
            const app = !getApps().length ? initializeApp(firebaseConfig) : getApp();
            
            window.SundragonFB = {
                auth: getAuth(app),
                db: getFirestore(app),
                storage: getStorage(app),
                authOps: { signInWithEmailAndPassword, onAuthStateChanged, signOut },
                dbOps: { collection, getDocs, query, orderBy, addDoc, serverTimestamp, doc, deleteDoc, getDoc, setDoc, writeBatch, updateDoc },
                storageOps: { ref, uploadBytesResumable, getDownloadURL, deleteObject }
            };

            window.dispatchEvent(new Event('firebase-armed'));
        } catch (error) {
            console.error("Critical Firebase Boot Failure:", error);
            window.firebaseBootError = error.message;
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        function App() {
            // System State
            const [fbReady, setFbReady] = useState(!!window.SundragonFB);
            const [bootError, setBootError] = useState(window.firebaseBootError || null);
            const [geminiApiKey, setGeminiApiKey] = useState(localStorage.getItem('geminiApiKey') || '');
            const [dialog, setDialog] = useState(null); 
            
            // Auth State
            const [user, setUser] = useState(null);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [authError, setAuthError] = useState('');
            
            // Data State
            const [products, setProducts] = useState([]);
            const [settings, setSettings] = useState({ 
                heroTitleEn: 'Presence<br>in every <br><span class="text-saffron-500 italic">piece</span>',
                heroTitleRu: 'Присутствие<br>в каждом <br><span class="text-saffron-500 italic">предмете</span>',
                heroDescEn: 'Nearly five years building ceramic tools for presence and ritual practice.',
                heroDescRu: 'Около пяти лет создания керамических инструментов для практик.',
                categories: 'Teapot, Teacup, Oil lamp, Amulet, Ocarina, Chillum, Pipe, Bubbler, Secret'
            });
            const [loading, setLoading] = useState(true);
            const [uploading, setUploading] = useState(false);
            const [savingSettings, setSavingSettings] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);
            const [isBulkDeleting, setIsBulkDeleting] = useState(false);
            const [activeTab, setActiveTab] = useState('inventory');
            
            // Form & Edit State
            const [editingId, setEditingId] = useState(null);
            const [existingImages, setExistingImages] = useState([]);
            const [imagesToDelete, setImagesToDelete] = useState([]);
            
            const [titleEn, setTitleEn] = useState('');
            const [titleRu, setTitleRu] = useState('');
            const [price, setPrice] = useState('');
            const [whatIsThisForEn, setWhatIsThisForEn] = useState('');
            const [whatIsThisForRu, setWhatIsThisForRu] = useState('');
            const [howToUseEn, setHowToUseEn] = useState('');
            const [howToUseRu, setHowToUseRu] = useState('');
            const [materialEn, setMaterialEn] = useState('stoneclay, handcraft');
            const [materialRu, setMaterialRu] = useState('глина, ручная работа');
            const [category, setCategory] = useState('');
            const [location, setLocation] = useState('');
            const [imageFiles, setImageFiles] = useState([]);
            
            // AI State
            const [isAnalyzing, setIsAnalyzing] = useState(false);

            // Dialog Helpers
            const showMessage = (msg) => setDialog({ type: 'alert', message: msg });
            const showConfirm = (msg, onConfirm) => setDialog({ type: 'confirm', message: msg, onConfirm });

            useEffect(() => {
                const handleArmed = () => setFbReady(true);
                window.addEventListener('firebase-armed', handleArmed);
                if (window.SundragonFB) setFbReady(true);
                if (window.firebaseBootError) setBootError(window.firebaseBootError);
                return () => window.removeEventListener('firebase-armed', handleArmed);
            }, []);

            useEffect(() => {
                if (!fbReady || bootError) {
                    if (bootError) setLoading(false);
                    return;
                }
                const { auth, db, authOps } = window.SundragonFB;
                const unsubscribe = authOps.onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    setLoading(false);
                    if (currentUser) {
                        fetchProducts(db);
                        fetchSettings(db);
                    }
                });
                return () => unsubscribe();
            }, [fbReady, bootError]);

            const fetchProducts = async (dbInstance) => {
                setIsSyncing(true);
                const { dbOps } = window.SundragonFB;
                try {
                    const q = dbOps.query(dbOps.collection(dbInstance, "products"), dbOps.orderBy("createdAt", "desc"));
                    const querySnapshot = await dbOps.getDocs(q);
                    let items = [];
                    querySnapshot.forEach((doc) => items.push({ id: doc.id, ...doc.data() }));
                    setProducts(items);
                } catch (error) {
                    console.error("Query Error:", error);
                    if (error.message.includes('index')) {
                        const simpleSnapshot = await dbOps.getDocs(dbOps.collection(dbInstance, "products"));
                        let items = [];
                        simpleSnapshot.forEach((doc) => items.push({ id: doc.id, ...doc.data() }));
                        setProducts(items);
                    }
                }
                setTimeout(() => setIsSyncing(false), 500);
            };

            const fetchSettings = async (dbInstance) => {
                const { dbOps } = window.SundragonFB;
                try {
                    const docSnap = await dbOps.getDoc(dbOps.doc(dbInstance, "settings", "storefront"));
                    if (docSnap.exists()) {
                        setSettings(docSnap.data());
                    }
                } catch (e) {
                    console.error("Failed to fetch settings", e);
                }
            };

            const saveSettings = async (e) => {
                e.preventDefault();
                setSavingSettings(true);
                const { db, dbOps } = window.SundragonFB;
                try {
                    await dbOps.setDoc(dbOps.doc(db, "settings", "storefront"), settings);
                    showMessage("Settings updated successfully!");
                } catch (e) {
                    console.error(e);
                    showMessage("Failed to save settings: " + e.message);
                }
                setSavingSettings(false);
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true); setAuthError('');
                try {
                    const { auth, authOps } = window.SundragonFB;
                    await authOps.signInWithEmailAndPassword(auth, email, password);
                } catch (err) {
                    setAuthError(`Access Denied: ${err.message}`);
                    setLoading(false);
                }
            };

            const handleLogout = async () => {
                const { auth, authOps } = window.SundragonFB;
                await authOps.signOut(auth);
                setUser(null);
            };

            const resetForm = () => {
                setTitleEn(''); setTitleRu(''); setPrice(''); 
                setWhatIsThisForEn(''); setWhatIsThisForRu('');
                setHowToUseEn(''); setHowToUseRu(''); 
                setMaterialEn('stoneclay, handcraft'); setMaterialRu('глина, ручная работа'); 
                setCategory(''); setLocation(''); 
                setImageFiles([]); setExistingImages([]); setImagesToDelete([]);
                setEditingId(null);
                if (document.getElementById('file-upload')) document.getElementById('file-upload').value = '';
            };

            const handleEditClick = (product) => {
                setEditingId(product.id);
                setTitleEn(product.title?.en || '');
                setTitleRu(product.title?.ru || (typeof product.title === 'string' ? product.title : ''));
                setPrice(product.price || '');
                setWhatIsThisForEn(product.whatIsThisFor?.en || '');
                setWhatIsThisForRu(product.whatIsThisFor?.ru || '');
                setHowToUseEn(product.howToUse?.en || '');
                setHowToUseRu(product.howToUse?.ru || '');
                setMaterialEn(product.material?.en || '');
                setMaterialRu(product.material?.ru || '');
                setCategory(product.category || '');
                setLocation(product.location || '');
                
                const imgs = product.images || (product.imageUrl ? [{url: product.imageUrl, path: product.imagePath}] : []);
                setExistingImages(imgs);
                setImagesToDelete([]);
                setImageFiles([]);
                
                setActiveTab('inventory');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleRemoveExistingImage = (imgToRemove) => {
                setExistingImages(prev => prev.filter(img => img.path !== imgToRemove.path));
                setImagesToDelete(prev => [...prev, imgToRemove]);
            };

            const compressImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (event) => {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 1000;
                            const scaleSize = MAX_WIDTH / img.width;
                            canvas.width = MAX_WIDTH;
                            canvas.height = img.height * scaleSize;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.85);
                        };
                    };
                });
            };

            const fileToBase64 = (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => resolve(reader.result.split(',')[1]);
                    reader.onerror = error => reject(error);
                });
            };

            const analyzeImageWithGemini = async () => {
                const targetImage = imageFiles.length > 0 ? imageFiles[0] : null;
                
                if (!targetImage && existingImages.length === 0) {
                    showMessage("Please select or have an image available to analyze.");
                    return;
                }
                
                if (!geminiApiKey) {
                    showMessage("Please configure your Gemini API Key in the Storefront Settings tab first.");
                    return;
                }

                setIsAnalyzing(true);
                try {
                    let base64Image = '';
                    let mimeType = 'image/jpeg';
                    
                    if (targetImage) {
                        base64Image = await fileToBase64(targetImage);
                        mimeType = targetImage.type;
                    } else if (existingImages.length > 0) {
                        const res = await fetch(existingImages[0].url);
                        const blob = await res.blob();
                        base64Image = await fileToBase64(blob);
                        mimeType = blob.type || 'image/jpeg';
                    }

                    const availableCategories = settings.categories || "Teapot, Teacup, Oil lamp, Amulet, Ocarina, Chillum, Pipe, Bubbler, Secret";

                    const promptText = `
                    Analyze this image of a product for an online store called Sun Dragon Tree. 
                    The store sells rare botanical extracts and artisanal goods.
                    
                    Please provide a JSON response with the following structure. 
                    Provide translations for both English (en) and Russian (ru).
                    Do not use markdown formatting like \`\`\`json in your response, just return the raw JSON object.

                    {
                        "title": { "en": "Creative, poetic title", "ru": "Translation of title" },
                        "whatIsThisFor": { "en": "Short description of the item's purpose or aesthetic", "ru": "Translation" },
                        "howToUse": { "en": "Instructions on how to care for or use it", "ru": "Translation" },
                        "material": { "en": "Materials it appears to be made of", "ru": "Translation" },
                        "category": "Choose ONE from this exact list: [${availableCategories}] based on the image. If unsure, choose the closest fit."
                    }
                    `;

                    const payload = {
                        contents: [{ parts: [ { text: promptText }, { inlineData: { mimeType: mimeType, data: base64Image } } ] }],
                        generationConfig: { responseMimeType: "application/json" }
                    };

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiApiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error((await response.json()).error?.message || "API request failed");

                    const data = await response.json();
                    const result = JSON.parse(data.candidates[0].content.parts[0].text);

                    if (result.title) { setTitleEn(result.title.en || ''); setTitleRu(result.title.ru || ''); }
                    if (result.whatIsThisFor) { setWhatIsThisForEn(result.whatIsThisFor.en || ''); setWhatIsThisForRu(result.whatIsThisFor.ru || ''); }
                    if (result.howToUse) { setHowToUseEn(result.howToUse.en || ''); setHowToUseRu(result.howToUse.ru || ''); }
                    if (result.material) { setMaterialEn(result.material.en || ''); setMaterialRu(result.material.ru || ''); }
                    if (result.category) {
                        const cats = settings.categories ? settings.categories.split(',').map(c => c.trim()) : [];
                        const matchedCat = cats.find(c => c.toLowerCase() === result.category.toLowerCase());
                        if (matchedCat) setCategory(matchedCat);
                    }
                    showMessage("Analysis complete! Fields have been auto-populated.");
                } catch (error) {
                    console.error("AI Analysis failed:", error);
                    showMessage(`AI Analysis failed: ${error.message}`);
                } finally {
                    setIsAnalyzing(false);
                }
            };

            const handleAddOrUpdateProduct = async (e) => {
                e.preventDefault();
                if (!titleEn && !titleRu) {
                    showMessage("Please provide at least a title.");
                    return;
                }
                if (existingImages.length === 0 && imageFiles.length === 0) {
                    showMessage("Artifact must have at least one image.");
                    return;
                }
                
                setUploading(true);
                try {
                    const { db, storage, dbOps, storageOps } = window.SundragonFB;
                    
                    const uploadPromises = imageFiles.map(async (file, index) => {
                        const compressedBlob = await compressImage(file);
                        const uniqueFileName = `products/${Date.now()}_${index}_${file.name.replace(/[^a-zA-Z0-9.]/g, '')}`;
                        const storageRef = storageOps.ref(storage, uniqueFileName);
                        await storageOps.uploadBytesResumable(storageRef, compressedBlob);
                        const downloadURL = await storageOps.getDownloadURL(storageRef);
                        return { url: downloadURL, path: uniqueFileName };
                    });
                    
                    const newUploadedImages = await Promise.all(uploadPromises);
                    const finalImages = [...existingImages, ...newUploadedImages];
                    
                    const payload = {
                        title: { en: titleEn || titleRu, ru: titleRu || titleEn },
                        price: price,
                        whatIsThisFor: { en: whatIsThisForEn, ru: whatIsThisForRu },
                        howToUse: { en: howToUseEn, ru: howToUseRu },
                        material: { en: materialEn, ru: materialRu },
                        category: category || "Uncategorized",
                        location: location,
                        images: finalImages,
                        imageUrl: finalImages.length > 0 ? finalImages[0].url : '', 
                        imagePath: finalImages.length > 0 ? finalImages[0].path : ''
                    };

                    if (editingId) {
                        payload.updatedAt = dbOps.serverTimestamp();
                        await dbOps.updateDoc(dbOps.doc(db, "products", editingId), payload);
                        
                        const deletePromises = imagesToDelete.map(img => 
                            storageOps.deleteObject(storageOps.ref(storage, img.path)).catch(err => console.warn("Deletion failed", err))
                        );
                        await Promise.all(deletePromises);
                        showMessage("Artifact updated successfully!");
                    } else {
                        payload.createdAt = dbOps.serverTimestamp();
                        await dbOps.addDoc(dbOps.collection(db, "products"), payload);
                        showMessage("Product added successfully!");
                    }
                    
                    resetForm();
                    await fetchProducts(db);
                } catch (error) {
                    console.error("Transaction failed:", error);
                    showMessage(`Transaction failed: ${error.message}`);
                }
                setUploading(false);
            };

            const executeDelete = async (productId, imagePath, imagesArray) => {
                try {
                    const { db, storage, dbOps, storageOps } = window.SundragonFB;
                    if (imagesArray && imagesArray.length > 0) {
                        const deletePromises = imagesArray.map(img => {
                            const imageRef = storageOps.ref(storage, img.path);
                            return storageOps.deleteObject(imageRef).catch(err => console.warn("Object missing", err));
                        });
                        await Promise.all(deletePromises);
                    } else if (imagePath) {
                        const imageRef = storageOps.ref(storage, imagePath);
                        await storageOps.deleteObject(imageRef).catch(err => console.warn("Object missing", err));
                    }
                    await dbOps.deleteDoc(dbOps.doc(db, "products", productId));
                    await fetchProducts(db);
                } catch (error) {
                    console.error("Deletion transaction failed:", error);
                    showMessage("Failed to delete artifact.");
                }
            };

            const handleDelete = (productId, imagePath, imagesArray) => {
                showConfirm("Confirm destructive action: Permanently delete this artifact?", () => executeDelete(productId, imagePath, imagesArray));
            };

            const executeBulkDelete = async () => {
                setIsBulkDeleting(true);
                try {
                    const { db, storage, dbOps, storageOps } = window.SundragonFB;
                    const chunkSize = 400;
                    for (let i = 0; i < products.length; i += chunkSize) {
                        const chunk = products.slice(i, i + chunkSize);
                        const batch = dbOps.writeBatch(db);
                        
                        const imageDeletes = [];
                        chunk.forEach(product => {
                            if (product.images && product.images.length > 0) {
                                product.images.forEach(img => {
                                     imageDeletes.push(storageOps.deleteObject(storageOps.ref(storage, img.path)).catch(e => console.warn("Image delete failed", e)));
                                });
                            } else if (product.imagePath) {
                                imageDeletes.push(storageOps.deleteObject(storageOps.ref(storage, product.imagePath)).catch(e => console.warn("Image delete failed", e)));
                            }
                            batch.delete(dbOps.doc(db, "products", product.id));
                        });
                        await Promise.all(imageDeletes);
                        await batch.commit();
                    }
                    await fetchProducts(db);
                    showMessage("All artifacts have been successfully deleted.");
                } catch (error) {
                    console.error("Bulk deletion failed:", error);
                    showMessage("Bulk deletion encountered an error. Some items may remain.");
                }
                setIsBulkDeleting(false);
            };

            const handleBulkDelete = () => {
                showConfirm(`DANGER: Are you absolutely sure you want to delete ALL ${products.length} artifacts? This cannot be undone.`, executeBulkDelete);
            };

            if (loading && !bootError) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-900 text-white font-mono text-sm tracking-widest">
                        <i className="fa-solid fa-circle-notch fa-spin mr-3 text-saffron-500"></i> INITIALIZING SYSTEM...
                    </div>
                );
            }

            if (bootError) return (<div className="min-h-screen flex items-center justify-center bg-slate-900 text-red-500 font-mono p-4">{bootError}</div>);

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-stone-100 p-4 font-sans relative">
                        <div className="bg-white p-8 rounded-xl shadow-xl w-full max-w-md border border-stone-200">
                            <div className="text-center mb-8">
                                <h1 className="text-2xl font-bold text-stone-800">Sun Dragon CMS</h1>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-5">
                                <input type="email" required placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} className="w-full border rounded-md px-4 py-3 bg-stone-50" />
                                <input type="password" required placeholder="Password" value={password} onChange={e => setPassword(e.target.value)} className="w-full border rounded-md px-4 py-3 bg-stone-50" />
                                {authError && <p className="text-red-700 text-xs font-bold">{authError}</p>}
                                <button type="submit" className="w-full bg-saffron-500 text-white font-bold py-3 rounded-md hover:bg-saffron-600">AUTHENTICATE</button>
                            </form>
                        </div>
                    </div>
                );
            }

            const categoryList = settings.categories ? settings.categories.split(',').map(c => c.trim()) : [];

            return (
                <div className="min-h-screen bg-stone-50 pb-20 font-sans text-stone-800 relative">
                    <nav className="bg-white shadow-sm border-b border-stone-200 sticky top-0 z-10">
                        <div className="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
                            <div className="flex items-center gap-6">
                                <a href="#" onClick={(e) => { e.preventDefault(); window.location.reload(); }} className="font-heading text-xl font-bold text-saffron-600 tracking-wide hover:text-saffron-500 transition cursor-pointer">Sun Dragon Admin</a>
                                <div className="hidden md:flex gap-4">
                                    <button onClick={() => setActiveTab('inventory')} className={`text-sm font-bold pb-1 border-b-2 ${activeTab === 'inventory' ? 'border-saffron-600 text-saffron-700' : 'border-transparent text-stone-500 hover:text-saffron-500'}`}>Inventory</button>
                                    <button onClick={() => setActiveTab('settings')} className={`text-sm font-bold pb-1 border-b-2 ${activeTab === 'settings' ? 'border-saffron-600 text-saffron-700' : 'border-transparent text-stone-500 hover:text-saffron-500'}`}>Storefront Settings</button>
                                </div>
                            </div>
                            <button onClick={handleLogout} className="text-stone-500 hover:text-red-600 text-sm font-semibold transition-colors">
                                LOGOUT
                            </button>
                        </div>
                    </nav>

                    <div className="max-w-6xl mx-auto px-4 mt-8">
                        {activeTab === 'settings' && (
                            <div className="bg-white rounded-xl shadow-sm border border-stone-200 p-8 max-w-2xl mx-auto">
                                <h2 className="text-xl font-bold text-stone-800 mb-6 border-b pb-3">Edit Public Website Texts (Bilingual Setup)</h2>
                                <form onSubmit={saveSettings} className="space-y-6">
                                    <div className="bg-saffron-50 p-4 rounded text-xs text-saffron-800 mb-6">
                                        <i className="fa-solid fa-info-circle mr-2"></i>
                                        <strong>Pro Tip:</strong> To recreate the split-style text in the new design, you can use HTML tags like <code>&lt;br&gt;</code> and <code>&lt;span class="text-saffron-500 italic"&gt;text&lt;/span&gt;</code> in the Title fields.
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-bold text-stone-500 uppercase mb-1">Hero Title (EN)</label>
                                            <input type="text" value={settings.heroTitleEn || ''} onChange={e => setSettings({...settings, heroTitleEn: e.target.value})} className="w-full border rounded px-3 py-2 text-sm bg-stone-50" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-stone-500 uppercase mb-1">Hero Title (RU)</label>
                                            <input type="text" value={settings.heroTitleRu || ''} onChange={e => setSettings({...settings, heroTitleRu: e.target.value})} className="w-full border rounded px-3 py-2 text-sm bg-stone-50" />
                                        </div>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-bold text-stone-500 uppercase mb-1">Hero Description (EN)</label>
                                            <textarea rows="3" value={settings.heroDescEn || ''} onChange={e => setSettings({...settings, heroDescEn: e.target.value})} className="w-full border rounded px-3 py-2 text-sm bg-stone-50 resize-none"></textarea>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-stone-500 uppercase mb-1">Hero Description (RU)</label>
                                            <textarea rows="3" value={settings.heroDescRu || ''} onChange={e => setSettings({...settings, heroDescRu: e.target.value})} className="w-full border rounded px-3 py-2 text-sm bg-stone-50 resize-none"></textarea>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-xs font-bold text-stone-500 uppercase mb-1">Product Categories (Comma Separated)</label>
                                        <input type="text" value={settings.categories || ''} onChange={e => setSettings({...settings, categories: e.target.value})} placeholder="Teapot, Teacup, Oil lamp..." className="w-full border rounded px-3 py-2 text-sm bg-stone-50" />
                                    </div>
                                    <div className="border-t pt-4">
                                        <label className="block text-xs font-bold text-stone-500 uppercase mb-1">Gemini API Key (For Auto-Fill)</label>
                                        <input type="password" value={geminiApiKey} onChange={e => { setGeminiApiKey(e.target.value); localStorage.setItem('geminiApiKey', e.target.value); }} placeholder="AIzaSy..." className="w-full border rounded px-3 py-2 text-sm bg-stone-50" />
                                    </div>
                                    <button type="submit" disabled={savingSettings} className="bg-saffron-600 text-white font-bold py-3 px-6 rounded shadow hover:bg-saffron-700 transition">
                                        {savingSettings ? 'SAVING...' : 'SAVE SETTINGS'}
                                    </button>
                                </form>
                            </div>
                        )}

                        {activeTab === 'inventory' && (
                            <div className="grid grid-cols-1 xl:grid-cols-3 gap-8">
                                {/* LEFT: ADD/EDIT PRODUCT */}
                                <div className="xl:col-span-1">
                                    <div className="bg-white rounded-xl shadow-sm border border-stone-200 p-6 sticky top-24 max-h-[85vh] overflow-y-auto">
                                        <div className="flex justify-between items-center mb-6 border-b pb-3">
                                            <h2 className="text-lg font-bold text-stone-800">
                                                {editingId ? 'Edit Artifact' : 'Add New Artifact'}
                                            </h2>
                                            {editingId && (
                                                <button type="button" onClick={resetForm} className="text-xs font-bold text-red-500 hover:text-red-700 uppercase">
                                                    Cancel Edit
                                                </button>
                                            )}
                                        </div>
                                        
                                        <form onSubmit={handleAddOrUpdateProduct} className="space-y-4">
                                            
                                            <div className="p-3 bg-saffron-50 rounded border border-saffron-100 flex flex-col gap-2">
                                                <label className="block text-xs font-bold text-saffron-700 uppercase tracking-wider mb-1">1. Images</label>
                                                
                                                {existingImages.length > 0 && (
                                                    <div className="mb-2 border-b border-saffron-200 pb-2">
                                                        <p className="text-[10px] font-bold text-stone-500 uppercase mb-1">Current Images</p>
                                                        <div className="flex gap-2 overflow-x-auto hide-scroll">
                                                            {existingImages.map((img, idx) => (
                                                                <div key={idx} className="relative w-12 h-12 flex-shrink-0 border rounded overflow-hidden shadow-sm">
                                                                    <img src={img.url} className="w-full h-full object-cover" />
                                                                    <button type="button" onClick={() => handleRemoveExistingImage(img)} className="absolute top-0 right-0 bg-red-500/80 hover:bg-red-600 text-white w-4 h-4 flex items-center justify-center text-[10px]"><i className="fa-solid fa-times"></i></button>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}

                                                <input type="file" id="file-upload" accept="image/*" multiple onChange={e => setImageFiles(Array.from(e.target.files))} className="w-full text-xs" />
                                                <button type="button" onClick={analyzeImageWithGemini} disabled={isAnalyzing || (!imageFiles.length && existingImages.length === 0)} className={`w-full py-2 rounded text-xs font-bold text-white shadow transition ${isAnalyzing ? 'bg-saffron-300 cursor-not-allowed' : (!imageFiles.length && existingImages.length === 0 ? 'bg-stone-300 cursor-not-allowed' : 'bg-saffron-500 hover:bg-saffron-600')}`}>
                                                    {isAnalyzing ? <><i className="fa-solid fa-spinner fa-spin mr-1"></i> ANALYZING...</> : <><i className="fa-solid fa-wand-magic-sparkles mr-1"></i> AUTO-FILL WITH AI</>}
                                                </button>
                                            </div>

                                            <div className="grid grid-cols-2 gap-2 mt-4">
                                                <div>
                                                    <label className="block text-[10px] font-bold text-stone-500 uppercase">Title (EN)</label>
                                                    <input type="text" value={titleEn} onChange={e => setTitleEn(e.target.value)} className="w-full border rounded px-2 py-2 text-sm bg-stone-50" />
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] font-bold text-stone-500 uppercase">Title (RU)</label>
                                                    <input type="text" value={titleRu} onChange={e => setTitleRu(e.target.value)} className="w-full border rounded px-2 py-2 text-sm bg-stone-50" />
                                                </div>
                                            </div>
                                            
                                            <div className="grid grid-cols-2 gap-2">
                                                <div>
                                                    <label className="block text-[10px] font-bold text-stone-500 uppercase">Price</label>
                                                    <input type="text" value={price} onChange={e => setPrice(e.target.value)} placeholder="e.g. $120" className="w-full border rounded px-2 py-2 text-sm bg-stone-50" />
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] font-bold text-stone-500 uppercase">Category</label>
                                                    <select value={category} onChange={e => setCategory(e.target.value)} className="w-full border rounded px-2 py-2 text-sm bg-stone-50">
                                                        <option value="">Select...</option>
                                                        {categoryList.map((cat, i) => <option key={i} value={cat}>{cat}</option>)}
                                                    </select>
                                                </div>
                                            </div>

                                            <div>
                                                <label className="block text-[10px] font-bold text-stone-500 uppercase">Short Desc / What is this for (EN)</label>
                                                <textarea value={whatIsThisForEn} onChange={e => setWhatIsThisForEn(e.target.value)} rows="2" className="w-full border rounded px-2 py-1 text-sm bg-stone-50 resize-none"></textarea>
                                            </div>
                                            <div>
                                                <label className="block text-[10px] font-bold text-stone-500 uppercase">Short Desc / What is this for (RU)</label>
                                                <textarea value={whatIsThisForRu} onChange={e => setWhatIsThisForRu(e.target.value)} rows="2" className="w-full border rounded px-2 py-1 text-sm bg-stone-50 resize-none"></textarea>
                                            </div>

                                            <div className="grid grid-cols-2 gap-2 border-t pt-2">
                                                <div>
                                                    <label className="block text-[10px] font-bold text-stone-500 uppercase">How to use (EN)</label>
                                                    <textarea value={howToUseEn} onChange={e => setHowToUseEn(e.target.value)} rows="2" className="w-full border rounded px-2 py-1 text-sm bg-stone-50 resize-none"></textarea>
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] font-bold text-stone-500 uppercase">How to use (RU)</label>
                                                    <textarea value={howToUseRu} onChange={e => setHowToUseRu(e.target.value)} rows="2" className="w-full border rounded px-2 py-1 text-sm bg-stone-50 resize-none"></textarea>
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-2 gap-2">
                                                <div>
                                                    <label className="block text-[10px] font-bold text-stone-500 uppercase">Material (EN)</label>
                                                    <input type="text" value={materialEn} onChange={e => setMaterialEn(e.target.value)} className="w-full border rounded px-2 py-1 text-sm bg-stone-50" />
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] font-bold text-stone-500 uppercase">Material (RU)</label>
                                                    <input type="text" value={materialRu} onChange={e => setMaterialRu(e.target.value)} className="w-full border rounded px-2 py-1 text-sm bg-stone-50" />
                                                </div>
                                            </div>

                                            <div className="bg-stone-100 p-2 rounded border border-stone-200 mt-2">
                                                <label className="block text-[10px] font-bold text-stone-700 uppercase mb-1">Location / Country</label>
                                                <input type="text" value={location} onChange={e => setLocation(e.target.value)} placeholder="e.g. Vietnam (Leave empty if SOLD out)" className="w-full border rounded px-2 py-1 text-sm bg-white" />
                                            </div>
                                            
                                            <button type="submit" disabled={uploading || (imageFiles.length === 0 && existingImages.length === 0)} className={`w-full font-bold py-3 rounded text-white shadow mt-4 ${uploading || (imageFiles.length === 0 && existingImages.length === 0) ? 'bg-stone-400 cursor-not-allowed' : 'bg-saffron-600 hover:bg-saffron-700'}`}>
                                                {uploading ? 'SAVING...' : (editingId ? 'UPDATE ARTIFACT' : 'PUBLISH ARTIFACT')}
                                            </button>
                                        </form>
                                    </div>
                                </div>

                                {/* RIGHT: INVENTORY LIST */}
                                <div className="xl:col-span-2">
                                    <div className="bg-white rounded-xl shadow-sm border border-stone-200 p-6">
                                        <h2 className="text-lg font-bold text-stone-800 mb-6 flex justify-between items-center border-b pb-3">
                                            <span>Current Inventory ({products.length})</span>
                                            <div className="flex gap-4 items-center">
                                                {products.length > 0 && (
                                                    <button onClick={handleBulkDelete} disabled={isBulkDeleting} className={`text-xs font-bold uppercase transition ${isBulkDeleting ? 'text-red-300' : 'text-red-500 hover:text-red-700'}`}>
                                                        <i className={`fa-solid ${isBulkDeleting ? 'fa-spinner fa-spin' : 'fa-trash'} mr-1`}></i> {isBulkDeleting ? 'Deleting All...' : 'Delete All'}
                                                    </button>
                                                )}
                                                <button onClick={() => fetchProducts(window.SundragonFB.db)} disabled={isSyncing} className={`text-xs font-bold uppercase transition ${isSyncing ? 'text-saffron-400' : 'text-stone-500 hover:text-saffron-600'}`}>
                                                    <i className={`fa-solid fa-rotate ${isSyncing ? 'fa-spin' : ''} mr-1`}></i> {isSyncing ? 'Syncing...' : 'Sync'}
                                                </button>
                                            </div>
                                        </h2>

                                        {products.length === 0 ? (
                                            <div className="text-center py-16 text-stone-400 bg-stone-50 rounded">Empty Database</div>
                                        ) : (
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                {products.map(product => {
                                                    const isAvailable = !!product.location && product.location !== "Unspecified";
                                                    const dispTitle = typeof product.title === 'object' ? (product.title.ru || product.title.en) : product.title;
                                                    
                                                    // Ensure we have a valid fallback image to render in the Admin grid
                                                    const dispImage = (product.images && product.images.length > 0) ? product.images[0].url : product.imageUrl;

                                                    return (
                                                        <div key={product.id} className="border rounded overflow-hidden flex flex-col group">
                                                            <div className="h-48 relative overflow-hidden bg-stone-100">
                                                                <img src={dispImage} className="w-full h-full object-cover aspect-square" />
                                                                <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 flex items-center justify-center gap-3 transition-opacity">
                                                                    <button onClick={() => handleEditClick(product)} className="bg-saffron-500 text-white px-3 py-1 rounded text-xs font-bold shadow hover:bg-saffron-600 transition"><i className="fa-solid fa-pen mr-1"></i> EDIT</button>
                                                                    <button onClick={() => handleDelete(product.id, product.imagePath, product.images)} className="bg-red-600 text-white px-3 py-1 rounded text-xs font-bold shadow hover:bg-red-500 transition"><i className="fa-solid fa-trash mr-1"></i> DEL</button>
                                                                </div>
                                                                {!isAvailable && <span className="absolute top-2 left-2 bg-black/80 text-white text-xs px-2 py-1 rounded">SOLD</span>}
                                                            </div>
                                                            <div className="p-3 flex-grow flex flex-col">
                                                                <div className="flex justify-between items-start mb-2">
                                                                    <h3 className="font-bold text-sm line-clamp-1">{dispTitle}</h3>
                                                                    <span className="text-xs font-bold text-saffron-700 bg-saffron-50 px-1 rounded">{product.price}</span>
                                                                </div>
                                                                <p className="text-[10px] text-stone-500 uppercase font-bold">Cat: {product.category || 'N/A'}</p>
                                                                {product.location && product.location !== 'Unspecified' && <p className="text-[10px] text-gray-400 mt-1 uppercase"><i className="fa-solid fa-location-dot"></i> {product.location}</p>}
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                    
                    {/* CUSTOM DIALOG ALERTS */}
                    {dialog && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
                            <div className="bg-white rounded-xl shadow-2xl p-6 max-w-sm w-full">
                                <p className="text-stone-800 font-medium mb-6 text-center">{dialog.message}</p>
                                <div className="flex justify-center gap-3">
                                    {dialog.type === 'confirm' && (
                                        <button onClick={() => setDialog(null)} className="px-5 py-2 rounded text-stone-500 hover:bg-stone-100 font-bold text-sm transition">CANCEL</button>
                                    )}
                                    <button onClick={() => {
                                        if (dialog.onConfirm) dialog.onConfirm();
                                        setDialog(null);
                                    }} className="px-5 py-2 rounded bg-saffron-600 hover:bg-saffron-700 text-white font-bold text-sm shadow transition">
                                        OK
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
